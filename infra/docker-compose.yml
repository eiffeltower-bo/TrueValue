services:
  postgres:
    image: postgres:16-alpine
    container_name: truevalue_postgres
    environment:
      POSTGRES_USER: truevalue
      POSTGRES_PASSWORD: truevalue
      POSTGRES_DB: truevalue
    ports:
      - "5432:5432"
    volumes:
      - truevalue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truevalue -d truevalue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  truevalue_pg_data:
